<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0F172A" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="64x64" href="/favicon.png" />
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <title>TROPS IMMO | Haute Couture Immobilier</title>
    <meta
      name="description"
      content="TROPS IMMO conçoit des résidences d'exception en Algérie : architecture haute couture, matériaux nobles et services de conciergerie cinq étoiles."
    />
    <link rel="canonical" href="https://www.tropsimmo.com/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="TROPS IMMO" />

    <!-- Preconnect early so the font request doesn't block on DNS/TLS after CSS parses -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap"
    />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "RealEstateAgent",
        "name": "TROPS IMMO",
        "description": "Promoteur immobilier de résidences de luxe en Algérie.",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "DZ"
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
